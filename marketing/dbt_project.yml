name: 'marketing'
version: '1.0.0'
require-dbt-version: [">=1.9.0"]
profile: 'marketing'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  marketing:
    staging:
      +materialized: view
      +schema: mkt_stg
    marts:
      +materialized: table
      +schema: mkt_analytics
