models:
  - name: churn_prediction_input
    access: protected
    description: "Training dataset for customer churn prediction models. Contains all customer behavioral features plus binary churn label (no purchase in 180 days). Optimized for scikit-learn, XGBoost, and Snowflake ML pipelines. Grain: one row per customer."
    meta:
      owner: data-science-team
      domain: ml_features
      tier: gold
      pii_contains: false
      ml_use_case: churn_prediction
    columns:
      - name: customer_id
        description: "Customer identifier."
        tests:
          - unique
          - not_null
      - name: snapshot_date
        description: "Date features were computed."
      - name: is_churned
        description: "Binary churn label. True if no purchase in last 180 days or never purchased."
      - name: days_since_last_purchase
        description: "Recency feature: days since last order."
      - name: frequency_orders
        description: "Total lifetime order count."
      - name: monetary_value
        description: "Total lifetime revenue in EUR."
      - name: avg_order_value
        description: "Average order value in EUR."
      - name: std_order_value
        description: "Standard deviation of order values — measures spend consistency."
      - name: preferred_channel
        description: "Most frequently used ordering channel."
      - name: distinct_channels_used
        description: "Number of distinct channels used across all orders."
      - name: preferred_category
        description: "Most ordered product category."
      - name: days_since_signup
        description: "Days since account creation."
      - name: loyalty_tier_encoded
        description: "Loyalty tier as ordinal integer (Bronze=1, Silver=2, Gold=3, Platinum=4)."
      - name: has_returned_items
        description: "Whether customer has returned any items."
      - name: return_rate
        description: "Return rate (returns / orders)."
      - name: active_flag
        description: "True if customer status is active."
      - name: gender
        description: "Customer gender."
      - name: country
        description: "Customer country."
      - name: acquisition_channel
        description: "Channel through which the customer was acquired."
      - name: customer_tenure_days
        description: "Days since first order."
      - name: predicted_churn_probability_placeholder
        description: "Placeholder column for ML model scores to be written back to Snowflake. Initially NULL."

  - name: recommendation_input
    access: protected
    description: "User-item interaction matrix for collaborative filtering recommendation models. Contains implicit feedback signals from purchase history. Grain: one row per (customer_id, product_id) pair."
    meta:
      owner: data-science-team
      domain: ml_features
      tier: gold
      pii_contains: false
      ml_use_case: product_recommendation
    columns:
      - name: customer_id
        description: "Customer identifier."
        tests:
          - not_null
      - name: product_id
        description: "Product identifier."
        tests:
          - not_null
      - name: product_name
        description: "Product name."
      - name: category
        description: "Product category."
      - name: purchase_count
        description: "Number of orders containing this product by this customer."
      - name: total_units
        description: "Total units of this product purchased by this customer."
      - name: revenue
        description: "Total revenue from this customer-product pair in EUR."
      - name: last_purchased_date
        description: "Date of most recent purchase of this product."
      - name: first_purchased_date
        description: "Date of first purchase of this product."
      - name: implicit_rating
        description: "Implicit rating computed as ln(revenue + 1). Used as interaction strength for collaborative filtering."
      - name: days_since_purchase
        description: "Days since this customer last purchased this product. Used for recency weighting."

  - name: customer_lifetime_value_features
    access: protected
    description: "Feature set for supervised LTV prediction models. Combines cumulative purchase behavior with timing patterns and LTV tier labels for training gradient boosting or neural network models. Grain: one row per customer."
    meta:
      owner: data-science-team
      domain: ml_features
      tier: gold
      pii_contains: false
      ml_use_case: ltv_prediction
    columns:
      - name: customer_id
        description: "Customer identifier."
        tests:
          - unique
          - not_null
      - name: snapshot_date
        description: "Date features were computed."
      - name: months_since_signup
        description: "Approximate months since account creation."
      - name: customer_tenure_days
        description: "Exact days since first order."
      - name: order_count_so_far
        description: "Total orders placed to date."
      - name: cumulative_revenue_so_far
        description: "Total lifetime revenue in EUR."
      - name: avg_order_value
        description: "Average order value in EUR."
      - name: avg_inter_order_days
        description: "Average days between consecutive orders."
      - name: pct_of_avg_cycle_elapsed
        description: "How far through the average inter-order cycle the customer currently is (%). 100+ may signal an upcoming order."
      - name: orders_per_active_month
        description: "Average orders per month in which the customer ordered at least once."
      - name: active_purchase_months
        description: "Number of calendar months containing at least one order."
      - name: loyalty_tier_encoded
        description: "Loyalty tier ordinal (1-4)."
      - name: preferred_channel
        description: "Most used channel."
      - name: preferred_category
        description: "Most ordered category."
      - name: has_returned_items
        description: "Whether customer has returned items."
      - name: return_rate
        description: "Return rate."
      - name: gender
        description: "Customer gender."
      - name: country
        description: "Customer country."
      - name: acquisition_channel
        description: "Acquisition channel."
      - name: ltv_tier_label
        description: "LTV segment label for supervised learning. Values: very_low (<200 EUR), low (200-600 EUR), medium (600-1500 EUR), high (1500-3000 EUR), elite (3000+ EUR)."
