name: 'data_science'
version: '1.0.0'
require-dbt-version: [">=1.9.0"]
profile: 'data_science'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  data_science:
    features:
      +materialized: table
      +schema: ds_features
    prep:
      +materialized: table
      +schema: ds_prep
