models:
  - name: stg_customers
    description: "Cleaned and standardized customer records. One row per customer. Source of truth for customer identity and acquisition metadata."
    meta:
      owner: data-platform-team
      domain: customer
      tier: silver
      pii_contains: true
      pii_columns: ["email", "first_name", "last_name", "phone", "birth_date"]
    columns:
      - name: customer_id
        description: "Unique customer identifier. Format: CUST_XXXX."
        tests:
          - unique
          - not_null
      - name: first_name
        description: "Customer first name."
        tests:
          - not_null
      - name: last_name
        description: "Customer last name."
        tests:
          - not_null
      - name: email
        description: "Lowercased and trimmed customer email address."
        tests:
          - unique
          - not_null
      - name: phone
        description: "Customer phone number with country code."
      - name: birth_date
        description: "Customer date of birth."
      - name: gender
        description: "Customer gender identity. Values: M, F, Other."
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F', 'Other']
      - name: city
        description: "City of residence."
      - name: country
        description: "Country of residence."
      - name: signup_date
        description: "Date the customer created an account."
        tests:
          - not_null
      - name: loyalty_tier
        description: "Current loyalty tier. Values: Bronze, Silver, Gold, Platinum."
        tests:
          - accepted_values:
              arguments:
                values: ['Bronze', 'Silver', 'Gold', 'Platinum']
      - name: acquisition_channel
        description: "Channel through which customer was acquired."
        tests:
          - accepted_values:
              arguments:
                values: ['website', 'mobile_app', 'in_store', 'wholesale', 'referral']
      - name: loaded_at
        description: "Timestamp when this record was loaded from source."

  - name: stg_products
    description: "Cleaned product catalog with margin calculations. One row per product variant."
    meta:
      owner: product-team
      domain: product
      tier: silver
      pii_contains: false
    columns:
      - name: product_id
        description: "Unique product identifier. Format: PROD_XXX."
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Full product name."
        tests:
          - not_null
      - name: category
        description: "Top-level category."
        tests:
          - accepted_values:
              arguments:
                values: ['Bags', 'Wallets', 'Belts', 'Accessories', 'Shoes']
      - name: subcategory
        description: "Product subcategory."
      - name: material
        description: "Primary material."
        tests:
          - accepted_values:
              arguments:
                values: ['Full Grain Leather', 'Genuine Leather', 'Suede', 'Canvas', 'Patent Leather']
      - name: color
        description: "Product color."
      - name: unit_price
        description: "Current retail price in EUR."
        tests:
          - not_null
      - name: cost_price
        description: "Cost of goods per unit in EUR."
      - name: gross_margin
        description: "Gross margin per unit in EUR (unit_price - cost_price)."
      - name: margin_pct
        description: "Gross margin as a percentage of unit price."
      - name: sku_code
        description: "SKU code for inventory management."
      - name: collection
        description: "Design collection name."
        tests:
          - accepted_values:
              arguments:
                values: ['Haussmann', 'Rivoli', 'Marais', 'Vendome', 'Bastille', 'Classique']
      - name: is_active
        description: "Whether the product is currently available for sale."
      - name: launched_at
        description: "Product launch date."
      - name: loaded_at
        description: "Timestamp when this record was loaded."

  - name: stg_orders
    description: "Cleaned order header records. One row per order."
    meta:
      owner: commerce-team
      domain: orders
      tier: silver
      pii_contains: false
    columns:
      - name: order_id
        description: "Unique order identifier. Format: ORD_XXXXX."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "FK to stg_customers."
        tests:
          - not_null
      - name: order_date
        description: "Date the order was placed."
        tests:
          - not_null
      - name: order_status
        description: "Current order lifecycle status."
        tests:
          - accepted_values:
              arguments:
                values: ['pending', 'confirmed', 'processing', 'shipped', 'delivered', 'cancelled', 'returned']
      - name: channel
        description: "Sales channel for this order."
      - name: shipping_city
        description: "Destination city."
      - name: shipping_country
        description: "Destination country."
      - name: shipping_method
        description: "Selected shipping method."
      - name: discount_code
        description: "Discount code applied. NULL if no code used."
      - name: discount_amount
        description: "Total discount amount in EUR. 0 if no discount."
      - name: loaded_at
        description: "Timestamp when this record was loaded."

  - name: stg_order_items
    description: "Cleaned order line items with line revenue calculation. One row per product per order."
    meta:
      owner: commerce-team
      domain: orders
      tier: silver
      pii_contains: false
    columns:
      - name: order_item_id
        description: "Unique order item identifier. Format: ITEM_XXXXXX."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "FK to stg_orders."
        tests:
          - not_null
      - name: product_id
        description: "FK to stg_products."
        tests:
          - not_null
      - name: quantity
        description: "Quantity of product ordered."
      - name: unit_price_at_order
        description: "Price per unit at time of order in EUR."
      - name: discount_pct
        description: "Line-level discount percentage. 0 = no discount."
      - name: line_revenue
        description: "Total line revenue after discount (qty * price * (1 - disc%))."
      - name: loaded_at
        description: "Timestamp when this record was loaded."

  - name: stg_payments
    description: "Cleaned payment transactions with EUR normalization. One row per payment."
    meta:
      owner: finance-team
      domain: payments
      tier: silver
      pii_contains: false
    columns:
      - name: payment_id
        description: "Unique payment identifier. Format: PAY_XXXXXX."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "FK to stg_orders."
        tests:
          - not_null
      - name: payment_date
        description: "Date the payment was processed."
      - name: payment_method
        description: "Payment method used."
      - name: amount
        description: "Payment amount in original currency."
      - name: currency
        description: "Original payment currency code."
      - name: amount_eur
        description: "Payment amount normalized to EUR using approximate exchange rates."
      - name: payment_status
        description: "Payment lifecycle status."
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'failed', 'refunded', 'pending']
      - name: gateway
        description: "Payment gateway used."
      - name: loaded_at
        description: "Timestamp when this record was loaded."

  - name: stg_shipments
    description: "Cleaned shipment tracking records. One row per shipment."
    meta:
      owner: logistics-team
      domain: fulfillment
      tier: silver
      pii_contains: false
    columns:
      - name: shipment_id
        description: "Unique shipment identifier. Format: SHIP_XXXXXX."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "FK to stg_orders."
        tests:
          - not_null
      - name: carrier
        description: "Shipping carrier name."
      - name: tracking_number
        description: "Carrier-issued tracking number."
      - name: estimated_delivery_date
        description: "Original estimated delivery date."
      - name: shipped_at
        description: "Date the parcel was dispatched."
      - name: delivered_at
        description: "Actual delivery date. NULL if not yet delivered."
      - name: shipment_status
        description: "Current shipment status."
        tests:
          - accepted_values:
              arguments:
                values: ['delivered', 'in_transit', 'failed', 'returned_to_sender']
      - name: loaded_at
        description: "Timestamp when this record was loaded."

  - name: stg_returns
    description: "Cleaned return requests and refund records. One row per return."
    meta:
      owner: commerce-team
      domain: returns
      tier: silver
      pii_contains: false
    columns:
      - name: return_id
        description: "Unique return identifier. Format: RET_XXXXX."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "FK to stg_orders."
        tests:
          - not_null
      - name: order_item_id
        description: "FK to stg_order_items for the specific item returned."
      - name: return_reason
        description: "Standardized return reason."
      - name: return_requested_at
        description: "Date the return was requested."
      - name: return_received_at
        description: "Date the return was received at the warehouse."
      - name: refund_amount
        description: "Refund amount in EUR."
      - name: refund_status
        description: "Current refund status."
        tests:
          - accepted_values:
              arguments:
                values: ['pending', 'approved', 'completed', 'rejected']
      - name: loaded_at
        description: "Timestamp when this record was loaded."

  - name: stg_campaigns
    description: "Cleaned marketing campaign definitions with derived fields. One row per campaign."
    meta:
      owner: marketing-team
      domain: marketing
      tier: silver
      pii_contains: false
    columns:
      - name: campaign_id
        description: "Unique campaign identifier. Format: CAMP_XXX."
        tests:
          - unique
          - not_null
      - name: campaign_name
        description: "Human-readable campaign name."
      - name: campaign_type
        description: "Campaign objective type."
      - name: channel
        description: "Primary marketing channel."
      - name: start_date
        description: "Campaign start date."
      - name: end_date
        description: "Campaign end date."
      - name: budget_eur
        description: "Total campaign budget in EUR."
      - name: target_segment
        description: "Target audience segment."
      - name: utm_source
        description: "UTM source for attribution tracking."
      - name: utm_medium
        description: "UTM medium for attribution tracking."
      - name: utm_campaign
        description: "UTM campaign slug for attribution tracking."
      - name: campaign_duration_days
        description: "Campaign length in days (end_date - start_date)."
      - name: loaded_at
        description: "Timestamp when this record was loaded."

  - name: stg_campaign_attributions
    description: "Cleaned attribution records linking orders to marketing campaigns."
    meta:
      owner: marketing-team
      domain: marketing
      tier: silver
      pii_contains: false
    columns:
      - name: attribution_id
        description: "Unique attribution record identifier."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "FK to stg_customers."
      - name: campaign_id
        description: "Primary campaign FK."
      - name: order_id
        description: "FK to stg_orders."
      - name: first_touch_campaign_id
        description: "First-touch campaign FK."
      - name: last_touch_campaign_id
        description: "Last-touch campaign FK."
      - name: attributed_revenue_eur
        description: "Revenue attributed to the campaign in EUR."
      - name: attribution_model
        description: "Attribution model applied."
      - name: loaded_at
        description: "Timestamp when this record was loaded."

  - name: stg_web_events
    description: "Cleaned website behavioral events with authentication flag. One row per event."
    meta:
      owner: data-platform-team
      domain: behavioral
      tier: silver
      pii_contains: false
    columns:
      - name: event_id
        description: "Unique event identifier. Format: EVT_XXXXXX."
        tests:
          - unique
          - not_null
      - name: session_id
        description: "Browser/app session identifier."
        tests:
          - not_null
      - name: customer_id
        description: "Customer ID if authenticated. NULL for anonymous visitors."
      - name: event_type
        description: "Type of behavioral event."
        tests:
          - accepted_values:
              arguments:
                values: ['page_view', 'product_view', 'add_to_cart', 'remove_from_cart', 'checkout_start', 'checkout_complete', 'search']
      - name: event_timestamp
        description: "UTC timestamp of the event."
        tests:
          - not_null
      - name: event_date
        description: "Date portion of the event timestamp."
      - name: page_url
        description: "URL of the page where the event occurred."
      - name: product_id
        description: "Product FK for product-related events. NULL otherwise."
      - name: device_type
        description: "Device category."
        tests:
          - accepted_values:
              arguments:
                values: ['desktop', 'mobile', 'tablet']
      - name: browser
        description: "Browser used."
      - name: utm_source
        description: "UTM source from the session."
      - name: is_authenticated
        description: "True if the visitor was logged in, false if anonymous."
      - name: loaded_at
        description: "Timestamp when this record was loaded."
