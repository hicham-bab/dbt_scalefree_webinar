metrics:
  - name: total_revenue
    description: "Total net revenue across all orders in EUR. Excludes cancelled and pending orders."
    type: simple
    type_params:
      measure:
        name: net_revenue
        fill_nulls_with: 0
    label: "Total Revenue (EUR)"

  - name: total_gross_revenue
    description: "Total gross revenue before discounts in EUR."
    type: simple
    type_params:
      measure:
        name: gross_revenue
        fill_nulls_with: 0
    label: "Total Gross Revenue (EUR)"

  - name: total_orders
    description: "Total count of distinct orders."
    type: simple
    type_params:
      measure:
        name: order_count
        fill_nulls_with: 0
    label: "Total Orders"

  - name: average_order_value
    description: "Average net revenue per order in EUR."
    type: simple
    type_params:
      measure:
        name: avg_order_value
        fill_nulls_with: 0
    label: "Average Order Value (EUR)"

  - name: discount_rate
    description: "Discount amount as a percentage of gross revenue. Measures promotional intensity."
    type: ratio
    type_params:
      numerator:
        name: discount_amount
      denominator:
        name: gross_revenue
    label: "Discount Rate"

  - name: revenue_last_7_days
    description: "Net revenue over the trailing 7 days."
    type: cumulative
    type_params:
      measure:
        name: net_revenue
      cumulative_type_params:
        window: 7
        period_agg: first
    label: "Revenue (Last 7 Days)"

  - name: revenue_last_30_days
    description: "Net revenue over the trailing 30 days."
    type: cumulative
    type_params:
      measure:
        name: net_revenue
      cumulative_type_params:
        window: 30
        period_agg: first
    label: "Revenue (Last 30 Days)"

  - name: new_customer_orders
    description: "Count of orders from customers placing their first ever order."
    type: simple
    type_params:
      measure:
        name: order_count
        fill_nulls_with: 0
    filter:
      - "{{ Dimension('order__is_first_order') }} = 'true'"
    label: "New Customer Orders"

  - name: avg_ltv
    description: "Average lifetime value per customer in EUR."
    type: simple
    type_params:
      measure:
        name: avg_ltv
        fill_nulls_with: 0
    label: "Avg Customer LTV (EUR)"

  - name: total_customers
    description: "Total count of distinct customers."
    type: simple
    type_params:
      measure:
        name: customer_count
        fill_nulls_with: 0
    label: "Total Customers"

  - name: returned_order_count
    description: "Count of orders that had at least one item returned."
    type: simple
    type_params:
      measure:
        name: order_count
        fill_nulls_with: 0
    filter:
      - "{{ Dimension('order__has_returned') }} = 'true'"
    label: "Returned Orders"

  - name: late_delivery_rate
    description: "Ratio of late deliveries (>7 days) to total shipped orders."
    type: ratio
    type_params:
      numerator:
        name: order_count
        filter:
          - "{{ Dimension('order__is_late_delivery') }} = 'true'"
      denominator:
        name: order_count
    label: "Late Delivery Rate"

  - name: avg_days_to_ship
    description: "Average number of days from order placement to shipment dispatch."
    type: simple
    type_params:
      measure:
        name: avg_days_to_ship
        fill_nulls_with: 0
    label: "Avg Days to Ship"

  - name: total_products
    description: "Total count of active products in the catalog."
    type: simple
    type_params:
      measure:
        name: product_count
        fill_nulls_with: 0
    label: "Total Products"

  - name: avg_product_margin
    description: "Average gross margin percentage across the product catalog."
    type: simple
    type_params:
      measure:
        name: avg_margin_pct
        fill_nulls_with: 0
    label: "Avg Product Margin (%)"
