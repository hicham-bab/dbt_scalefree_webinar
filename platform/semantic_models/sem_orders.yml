semantic_models:
  - name: orders
    description: "Order-level facts for revenue, volume, and fulfillment analysis. Primary semantic model for all revenue and order KPIs."
    model: ref('fct_orders')
    defaults:
      agg_time_dimension: order_date

    entities:
      - name: order
        type: primary
        expr: order_id
      - name: customer
        type: foreign
        expr: customer_id

    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
      - name: channel
        type: categorical
        description: "Sales channel through which the order was placed."
      - name: order_status
        type: categorical
        description: "Current lifecycle status of the order."
      - name: payment_method
        type: categorical
        description: "Payment method used for the order."
      - name: carrier
        type: categorical
        description: "Shipping carrier for the order."
      - name: shipping_country
        type: categorical
        description: "Destination country for the order."
      - name: is_first_order
        type: categorical
        description: "Whether this is the customer's first order (true/false)."
      - name: is_late_delivery
        type: categorical
        description: "Whether delivery took more than 7 days from shipment (true/false)."
      - name: is_refunded
        type: categorical
        description: "Whether a refund was issued for this order."
      - name: has_returned
        type: categorical
        description: "Whether any item in this order was returned."

    measures:
      - name: order_count
        description: "Total number of distinct orders."
        agg: count_distinct
        expr: order_id
      - name: gross_revenue
        description: "Sum of gross revenue before discounts in EUR."
        agg: sum
        expr: gross_revenue_eur
      - name: net_revenue
        description: "Sum of net revenue after discounts in EUR."
        agg: sum
        expr: net_revenue_eur
      - name: discount_amount
        description: "Total discounts applied in EUR."
        agg: sum
        expr: discount_amount_eur
      - name: avg_order_value
        description: "Average net order value in EUR."
        agg: average
        expr: net_revenue_eur
      - name: total_items
        description: "Total line items ordered."
        agg: sum
        expr: item_count
      - name: total_quantity
        description: "Total units ordered."
        agg: sum
        expr: total_quantity
      - name: avg_days_to_ship
        description: "Average days from order to shipment."
        agg: average
        expr: days_to_ship
      - name: avg_days_to_deliver
        description: "Average days from shipment to delivery."
        agg: average
        expr: days_to_deliver
