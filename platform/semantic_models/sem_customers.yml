semantic_models:
  - name: customers
    description: "Customer dimension semantic model. Use for customer segmentation, LTV analysis, and demographic breakdowns."
    model: ref('dim_customers')

    entities:
      - name: customer
        type: primary
        expr: customer_id

    dimensions:
      - name: loyalty_tier
        type: categorical
        description: "Customer loyalty tier: Bronze, Silver, Gold, Platinum."
      - name: acquisition_channel
        type: categorical
        description: "Channel through which the customer was acquired."
      - name: country
        type: categorical
        description: "Customer country of residence."
      - name: city
        type: categorical
        description: "Customer city of residence."
      - name: gender
        type: categorical
        description: "Customer gender identity."
      - name: customer_status
        type: categorical
        description: "Lifecycle status: prospect, active, at_risk, churned."
      - name: favorite_category
        type: categorical
        description: "Most frequently purchased product category."
      - name: signup_date
        type: time
        type_params:
          time_granularity: day
        description: "Date the customer signed up."

    measures:
      - name: customer_count
        description: "Total number of distinct customers."
        agg: count_distinct
        expr: customer_id
      - name: total_ltv
        description: "Sum of lifetime value across all customers in EUR."
        agg: sum
        expr: lifetime_value_eur
      - name: avg_ltv
        description: "Average lifetime value per customer in EUR."
        agg: average
        expr: lifetime_value_eur
      - name: avg_order_value
        description: "Average order value across customers in EUR."
        agg: average
        expr: avg_order_value_eur
      - name: avg_total_orders
        description: "Average number of orders per customer."
        agg: average
        expr: total_orders
      - name: avg_days_since_last_order
        description: "Average recency in days across customers."
        agg: average
        expr: days_since_last_order
